name: SonarCloud Analysis

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: ubuntu-latest
    
    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu' # SonarScanner requiere Java para ejecutarse

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Crucial para que SonarCloud pueda analizar el historial de Git

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install SonarCloud Scanner
        run: |
          dotnet tool install --global dotnet-sonarscanner

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Lo genera GitHub automáticamente
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}    # El que guardaste en Settings
        run: |
          dotnet-sonarscanner begin \
            /k:"migerusecurity07" \
            /o:"migerusecurity07" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.opencover.reportsPaths="**/*.opencover.xml"

          dotnet build --configuration Release

          dotnet test --configuration Release --collect:"XPlat Code Coverage" -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover

          dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"
